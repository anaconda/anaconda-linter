on:
  push:
    branches:
      - main
  pull_request:

name: Test

jobs:
  # NOTE: Tests run via `pre-commit`
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-env
        with:
          python-version: "3.11"
      # Executes `pre-commit` with the `make` directive to ensure all dependencies are found
      - run: |
          source $CONDA/bin/activate
          conda activate anaconda-linter
          make pre-commit
  build-recipe:
    runs-on: ubuntu-latest
    outputs:
      pkg-dir: /usr/share/miniconda/envs/build-env/conda-bld/noarch
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-env
        with:
          python-version: "3.11"
      - run: |
          source $CONDA/bin/activate
          conda activate build-env
          conda build -c distro-tooling --no-test recipe/meta.yaml
  test-package:
    runs-on: ubuntu-latest
    needs: build-recipe
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-env
        with:
          python-version: "3.11"
      - run: |
          source $CONDA/bin/activate
          conda activate build-env
          conda build -c distro-tooling --test ${{ needs.build-recipe.outputs.pkg-dir }}/anaconda-linter*.conda
